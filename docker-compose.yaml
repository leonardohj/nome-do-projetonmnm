version: "3"
networks:
  application:
    driver: bridge
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mybackend
    ports:
      - 8000:8000
    volumes:
      - ./backend:/app
    depends_on:
      - db
    environment:
      - DB_HOST=pgdb
      - DB_DATABASE=test-db
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - APP_ENV=local
      - APP_KEY=base64:xVYXqXyDrj/14D6Af7Y2Gb5Y6qw+gnjMmdndX/s44qY=
    networks:
      - application
    entrypoint: ["/bin/sh", "-c"]
    command: |
      composer install --no-dev --optimize-autoloader && \
      npm install && \
      npm run build && \
      php artisan migrate --force && \
      php artisan serve --host=0.0.0.0 --port=8000
  db:
    image: postgres:15
    ports:
      - "5432:5432"
    volumes:
      - ./data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=test-db
    networks:
      - application
    container_name: mypgdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5